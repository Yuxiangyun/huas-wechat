<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HUAS 运维面板</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --panel: #ffffff;
        --line: #d7dfeb;
        --text: #182338;
        --muted: #5f6f87;
        --primary: #1a66ff;
        --ok: #177e3e;
        --warn: #ad6400;
        --bad: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        color: var(--text);
        background: linear-gradient(140deg, #ebf2ff 0%, #f8fafd 55%, #eef6f1 100%);
      }

      .wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 18px;
      }

      .header {
        background: linear-gradient(116deg, #0b4ab8 0%, #1a66ff 58%, #3aa7ff 100%);
        color: #fff;
        border-radius: 14px;
        padding: 16px 18px;
        margin-bottom: 14px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .header h1 {
        margin: 0;
        font-size: 20px;
      }

      .header p {
        margin: 6px 0 0;
        font-size: 12px;
        opacity: 0.95;
      }

      .btn {
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      .btn.primary {
        background: #fff;
        color: #1242a9;
        font-weight: 700;
      }

      .btn.secondary {
        background: #dbe7ff;
        color: #1746a3;
      }

      .btn.warn {
        background: #ffe6bf;
        color: #5f3900;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 12px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
      }

      .col-12 {
        grid-column: span 12;
      }

      .col-8 {
        grid-column: span 8;
      }

      .col-6 {
        grid-column: span 6;
      }

      .col-4 {
        grid-column: span 4;
      }

      .col-3 {
        grid-column: span 3;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 14px;
      }

      .status {
        display: inline-block;
        border-radius: 99px;
        padding: 3px 8px;
        font-size: 11px;
        border: 1px solid var(--line);
      }

      .status.ok {
        color: var(--ok);
        border-color: #b4e0c2;
        background: #f2fcf5;
      }

      .status.error {
        color: var(--bad);
        border-color: #f2c3c1;
        background: #fff4f4;
      }

      .metric {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .metric .label {
        font-size: 12px;
        color: var(--muted);
      }

      .metric .value {
        font-size: 20px;
        font-weight: 700;
      }

      .meta {
        font-size: 12px;
        color: var(--muted);
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 8px;
        align-items: end;
      }

      .field {
        grid-column: span 12;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field label {
        font-size: 12px;
        color: var(--muted);
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        font-family: inherit;
        font-size: 12px;
        background: #fff;
        color: var(--text);
      }

      textarea {
        min-height: 90px;
        resize: vertical;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 8px;
        text-align: left;
        white-space: nowrap;
      }

      th {
        background: #f8fbff;
        color: #2b4164;
      }

      .log-box {
        min-height: 260px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #111a2d;
        color: #d6e7ff;
        padding: 10px;
        font-size: 12px;
        overflow: auto;
        white-space: pre-wrap;
        line-height: 1.4;
      }

      .ann-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        margin-bottom: 8px;
      }

      .ann-title {
        margin: 0 0 6px;
        font-size: 13px;
        font-weight: 700;
      }

      .ann-meta {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .ann-content {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.5;
        font-size: 12px;
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .hidden {
        display: none;
      }

      @media (max-width: 980px) {
        .col-8,
        .col-6,
        .col-4,
        .col-3 {
          grid-column: span 12;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div>
          <h1>HUAS 运维管理面板</h1>
          <p>手动刷新获取：服务状态、用户统计、公告管理、终端日志</p>
        </div>
        <div class="actions">
          <button id="refreshBtn" class="btn primary" type="button">统一刷新</button>
        </div>
      </div>

      <div class="grid">
        <div class="card col-12">
          <span id="serviceStatus" class="status">加载中</span>
          <span id="lastRefresh" class="meta"></span>
          <div id="errorMsg" class="hint hidden"></div>
        </div>

        <div class="card col-3"><div class="metric"><span class="label">总用户数</span><span id="mTotalUsers" class="value">-</span></div></div>
        <div class="card col-3"><div class="metric"><span class="label">今日活跃</span><span id="mTodayActive" class="value">-</span></div></div>
        <div class="card col-3"><div class="metric"><span class="label">近7天活跃</span><span id="mActive7d" class="value">-</span></div></div>
        <div class="card col-3"><div class="metric"><span class="label">近7天新增</span><span id="mNew7d" class="value">-</span></div></div>
        <div class="card col-3"><div class="metric"><span class="label">缓存条数</span><span id="mCache" class="value">-</span></div></div>
        <div class="card col-3"><div class="metric"><span class="label">凭证条数</span><span id="mCred" class="value">-</span></div></div>
        <div class="card col-3"><div class="metric"><span class="label">进程内存 (RSS MB)</span><span id="mMem" class="value">-</span></div></div>
        <div class="card col-3"><div class="metric"><span class="label">运行时长</span><span id="mUptime" class="value">-</span></div></div>

        <div class="card col-6">
          <h2>按专业统计 (class_name)</h2>
          <div class="table-wrap">
            <table>
              <thead><tr><th>专业</th><th>人数</th></tr></thead>
              <tbody id="majorStatsBody"><tr><td colspan="2">暂无数据</td></tr></tbody>
            </table>
          </div>
        </div>

        <div class="card col-6">
          <h2>按年级统计 (学号前4位)</h2>
          <div class="table-wrap">
            <table>
              <thead><tr><th>年级</th><th>人数</th></tr></thead>
              <tbody id="gradeStatsBody"><tr><td colspan="2">暂无数据</td></tr></tbody>
            </table>
          </div>
        </div>

        <div class="card col-12">
          <h2>用户表</h2>
          <div class="filters">
            <div class="field" style="grid-column: span 4;">
              <label for="searchInput">搜索（学号/姓名）</label>
              <input id="searchInput" placeholder="输入关键词" />
            </div>
            <div class="field" style="grid-column: span 3;">
              <label for="majorSelect">专业分类</label>
              <select id="majorSelect"><option value="">全部专业</option></select>
            </div>
            <div class="field" style="grid-column: span 3;">
              <label for="gradeSelect">年级分类</label>
              <select id="gradeSelect"><option value="">全部年级</option></select>
            </div>
            <div class="field" style="grid-column: span 2;">
              <div class="actions">
                <button id="applyFilterBtn" type="button" class="btn secondary">筛选</button>
                <button id="resetFilterBtn" type="button" class="btn warn">重置</button>
              </div>
            </div>
          </div>

          <div style="margin-top: 10px;" class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>学号</th>
                  <th>姓名</th>
                  <th>专业</th>
                </tr>
              </thead>
              <tbody id="usersBody">
                <tr><td colspan="3">暂无数据</td></tr>
              </tbody>
            </table>
          </div>

          <div style="margin-top: 10px;" class="actions">
            <button id="prevPageBtn" type="button" class="btn secondary">上一页</button>
            <button id="nextPageBtn" type="button" class="btn secondary">下一页</button>
            <span id="pageInfo" class="meta"></span>
          </div>
        </div>

        <div class="card col-6">
          <h2>公告管理</h2>
          <form id="annForm">
            <div class="field">
              <label for="annTitle">标题</label>
              <input id="annTitle" required />
            </div>
            <div class="field">
              <label for="annContent">内容</label>
              <textarea id="annContent" required></textarea>
            </div>
            <div class="filters">
              <div class="field" style="grid-column: span 6;">
                <label for="annDate">日期</label>
                <input id="annDate" type="date" required />
              </div>
              <div class="field" style="grid-column: span 6;">
                <label for="annType">类型</label>
                <select id="annType" required>
                  <option value="info">info</option>
                  <option value="warning">warning</option>
                  <option value="error">error</option>
                </select>
              </div>
            </div>
            <div class="actions" style="margin-top: 10px;">
              <button id="annSubmitBtn" class="btn secondary" type="submit">新增公告</button>
              <button id="annCancelEditBtn" class="btn warn hidden" type="button">取消编辑</button>
            </div>
          </form>
        </div>

        <div class="card col-6">
          <h2>公告列表</h2>
          <div id="annList" class="hint">暂无公告</div>
        </div>

        <div class="card col-12">
          <h2>终端最新 50 条</h2>
          <div id="logsBox" class="log-box">暂无日志</div>
        </div>
      </div>
    </div>

    <script>
      const BEIJING_TZ = 'Asia/Shanghai';

      function beijingParts(date = new Date()) {
        const parts = new Intl.DateTimeFormat('en-CA', {
          timeZone: BEIJING_TZ,
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        }).formatToParts(date);
        return Object.fromEntries(parts.map((part) => [part.type, part.value]));
      }

      function beijingDate(date = new Date()) {
        const p = beijingParts(date);
        return `${p.year}-${p.month}-${p.day}`;
      }

      function beijingDateTime(date = new Date()) {
        const p = beijingParts(date);
        return `${p.year}-${p.month}-${p.day} ${p.hour}:${p.minute}:${p.second}`;
      }

      const state = {
        page: 1,
        totalPages: 1,
        announcements: [],
        editingId: null,
      };

      const el = {
        refreshBtn: document.getElementById('refreshBtn'),
        serviceStatus: document.getElementById('serviceStatus'),
        lastRefresh: document.getElementById('lastRefresh'),
        errorMsg: document.getElementById('errorMsg'),

        mTotalUsers: document.getElementById('mTotalUsers'),
        mTodayActive: document.getElementById('mTodayActive'),
        mActive7d: document.getElementById('mActive7d'),
        mNew7d: document.getElementById('mNew7d'),
        mCache: document.getElementById('mCache'),
        mCred: document.getElementById('mCred'),
        mMem: document.getElementById('mMem'),
        mUptime: document.getElementById('mUptime'),

        majorStatsBody: document.getElementById('majorStatsBody'),
        gradeStatsBody: document.getElementById('gradeStatsBody'),

        searchInput: document.getElementById('searchInput'),
        majorSelect: document.getElementById('majorSelect'),
        gradeSelect: document.getElementById('gradeSelect'),
        applyFilterBtn: document.getElementById('applyFilterBtn'),
        resetFilterBtn: document.getElementById('resetFilterBtn'),

        usersBody: document.getElementById('usersBody'),
        prevPageBtn: document.getElementById('prevPageBtn'),
        nextPageBtn: document.getElementById('nextPageBtn'),
        pageInfo: document.getElementById('pageInfo'),

        annForm: document.getElementById('annForm'),
        annTitle: document.getElementById('annTitle'),
        annContent: document.getElementById('annContent'),
        annDate: document.getElementById('annDate'),
        annType: document.getElementById('annType'),
        annSubmitBtn: document.getElementById('annSubmitBtn'),
        annCancelEditBtn: document.getElementById('annCancelEditBtn'),
        annList: document.getElementById('annList'),

        logsBox: document.getElementById('logsBox'),
      };

      function formatUptime(seconds) {
        const s = Number(seconds || 0);
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        if (d > 0) return `${d}天 ${h}小时 ${m}分`;
        if (h > 0) return `${h}小时 ${m}分 ${sec}秒`;
        return `${m}分 ${sec}秒`;
      }

      function setError(message) {
        if (!message) {
          el.errorMsg.classList.add('hidden');
          el.errorMsg.textContent = '';
          return;
        }
        el.errorMsg.classList.remove('hidden');
        el.errorMsg.textContent = message;
      }

      async function requestJson(url, options = {}) {
        const res = await fetch(url, {
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {}),
          },
          ...options,
        });

        let payload = null;
        try {
          payload = await res.json();
        } catch {
          payload = null;
        }

        if (!res.ok || !payload?.success) {
          const msg = payload?.error_message || `请求失败(${res.status})`;
          throw new Error(msg);
        }

        return payload.data;
      }

      function buildDashboardUrl() {
        const params = new URLSearchParams();
        params.set('page', String(state.page));

        const search = el.searchInput.value.trim();
        const major = el.majorSelect.value;
        const grade = el.gradeSelect.value;

        if (search) params.set('search', search);
        if (major) params.set('major', major);
        if (grade) params.set('grade', grade);

        return `/api/admin/dashboard?${params.toString()}`;
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function renderSelectOptions(selectEl, values, placeholder) {
        const current = selectEl.value;
        const normalized = values.map((entry) => {
          if (typeof entry === 'string') {
            return { value: entry, label: entry };
          }
          return { value: entry.value, label: entry.label };
        });
        const unique = [];
        const used = new Set();
        normalized.forEach((entry) => {
          if (!entry.value || used.has(entry.value)) return;
          used.add(entry.value);
          unique.push(entry);
        });
        const options = [
          `<option value="">${escapeHtml(placeholder)}</option>`,
          ...unique.map(
            (entry) => `<option value="${escapeHtml(entry.value)}">${escapeHtml(entry.label)}</option>`
          ),
        ];
        selectEl.innerHTML = options.join('');

        if (current && unique.some((entry) => entry.value === current)) {
          selectEl.value = current;
        }
      }

      function renderStatsRows(tbody, rows, keyName) {
        if (!rows || rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="2">暂无数据</td></tr>';
          return;
        }
        tbody.innerHTML = rows
          .map((row) => `<tr><td>${escapeHtml(row[keyName])}</td><td>${escapeHtml(row.count)}</td></tr>`)
          .join('');
      }

      function renderUsers(users) {
        if (!users.items || users.items.length === 0) {
          el.usersBody.innerHTML = '<tr><td colspan="3">暂无数据</td></tr>';
        } else {
          el.usersBody.innerHTML = users.items
            .map(
              (item) =>
                `<tr><td>${escapeHtml(item.studentId)}</td><td>${escapeHtml(item.name || '-')}</td><td>${escapeHtml(item.className || '-')}</td></tr>`
            )
            .join('');
        }

        state.totalPages = users.totalPages || 1;
        el.pageInfo.textContent = `第 ${users.page} / ${users.totalPages} 页，每页 ${users.pageSize} 条，总计 ${users.total} 条`;
        el.prevPageBtn.disabled = users.page <= 1;
        el.nextPageBtn.disabled = users.page >= users.totalPages;

        renderSelectOptions(el.majorSelect, users.options?.majors || [], '全部专业');
        renderSelectOptions(el.gradeSelect, users.options?.grades || [], '全部年级');
      }

      function renderAnnouncements(items) {
        state.announcements = items || [];
        if (state.announcements.length === 0) {
          el.annList.innerHTML = '<div class="hint">暂无公告</div>';
          return;
        }

        el.annList.innerHTML = state.announcements
          .map(
            (item) => `
              <div class="ann-item">
                <p class="ann-title">${escapeHtml(item.title)}</p>
                <div class="ann-meta">${escapeHtml(item.id)} | ${escapeHtml(item.date)} | ${escapeHtml(item.type)}</div>
                <p class="ann-content">${escapeHtml(item.content)}</p>
                <div class="actions" style="margin-top:8px;">
                  <button type="button" class="btn secondary" data-action="edit" data-id="${escapeHtml(item.id)}">编辑</button>
                  <button type="button" class="btn warn" data-action="delete" data-id="${escapeHtml(item.id)}">删除</button>
                </div>
              </div>
            `
          )
          .join('');
      }

      function renderLogs(logs) {
        const lines = (logs.items || []).map((item) => item.line);
        el.logsBox.textContent = lines.length > 0 ? lines.join('\n') : '暂无日志';
        el.logsBox.scrollTop = el.logsBox.scrollHeight;
      }

      function resetAnnForm() {
        state.editingId = null;
        el.annTitle.value = '';
        el.annContent.value = '';
        el.annDate.value = beijingDate();
        el.annType.value = 'info';
        el.annSubmitBtn.textContent = '新增公告';
        el.annCancelEditBtn.classList.add('hidden');
      }

      async function refreshDashboard() {
        setError('');
        el.refreshBtn.disabled = true;
        el.refreshBtn.textContent = '刷新中...';

        try {
          const data = await requestJson(buildDashboardUrl());

          el.serviceStatus.className = `status ${data.service.status === 'ok' ? 'ok' : 'error'}`;
          el.serviceStatus.textContent = data.service.status === 'ok' ? '服务正常' : '服务异常';
          el.lastRefresh.textContent = `最后刷新：${beijingDateTime()}（北京时间）`;

          el.mTotalUsers.textContent = data.metrics.totalUsers;
          el.mTodayActive.textContent = data.metrics.todayActiveUsers;
          el.mActive7d.textContent = data.metrics.activeUsers7d;
          el.mNew7d.textContent = data.metrics.newUsers7d;
          el.mCache.textContent = data.metrics.cacheEntries;
          el.mCred.textContent = data.metrics.credentialEntries;
          el.mMem.textContent = data.metrics.memory.rssMb;
          el.mUptime.textContent = formatUptime(data.metrics.uptimeSeconds);

          renderStatsRows(el.majorStatsBody, data.distributions.byMajor, 'className');
          renderStatsRows(el.gradeStatsBody, data.distributions.byGrade, 'grade');
          renderUsers(data.users);
          renderAnnouncements(data.announcements);
          renderLogs(data.logs);
        } catch (err) {
          setError(err.message || '刷新失败');
        } finally {
          el.refreshBtn.disabled = false;
          el.refreshBtn.textContent = '统一刷新';
        }
      }

      el.refreshBtn.addEventListener('click', async () => {
        await refreshDashboard();
      });

      el.applyFilterBtn.addEventListener('click', async () => {
        state.page = 1;
        await refreshDashboard();
      });

      el.resetFilterBtn.addEventListener('click', async () => {
        el.searchInput.value = '';
        el.majorSelect.value = '';
        el.gradeSelect.value = '';
        state.page = 1;
        await refreshDashboard();
      });

      el.prevPageBtn.addEventListener('click', async () => {
        if (state.page <= 1) return;
        state.page -= 1;
        await refreshDashboard();
      });

      el.nextPageBtn.addEventListener('click', async () => {
        if (state.page >= state.totalPages) return;
        state.page += 1;
        await refreshDashboard();
      });

      el.annList.addEventListener('click', async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const btn = target.closest('button[data-action]');
        if (!btn) return;

        const action = btn.getAttribute('data-action');
        const id = btn.getAttribute('data-id');
        if (!id) return;

        if (action === 'edit') {
          const item = state.announcements.find((ann) => ann.id === id);
          if (!item) return;
          state.editingId = id;
          el.annTitle.value = item.title;
          el.annContent.value = item.content;
          el.annDate.value = item.date;
          el.annType.value = item.type;
          el.annSubmitBtn.textContent = '保存修改';
          el.annCancelEditBtn.classList.remove('hidden');
          return;
        }

        if (action === 'delete') {
          if (!window.confirm(`确认删除公告 ${id} ?`)) return;
          try {
            await requestJson(`/api/admin/announcements/${encodeURIComponent(id)}`, { method: 'DELETE' });
            await refreshDashboard();
            resetAnnForm();
          } catch (err) {
            setError(err.message || '删除失败');
          }
        }
      });

      el.annCancelEditBtn.addEventListener('click', () => {
        resetAnnForm();
      });

      el.annForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const payload = {
          title: el.annTitle.value.trim(),
          content: el.annContent.value.trim(),
          date: el.annDate.value,
          type: el.annType.value,
        };

        try {
          if (state.editingId) {
            await requestJson(`/api/admin/announcements/${encodeURIComponent(state.editingId)}`, {
              method: 'PUT',
              body: JSON.stringify(payload),
            });
          } else {
            await requestJson('/api/admin/announcements', {
              method: 'POST',
              body: JSON.stringify(payload),
            });
          }

          resetAnnForm();
          await refreshDashboard();
        } catch (err) {
          setError(err.message || '保存公告失败');
        }
      });

      resetAnnForm();
      refreshDashboard();
    </script>
  </body>
</html>
