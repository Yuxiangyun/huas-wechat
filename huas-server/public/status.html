<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>HUAS 运维监控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"IBM Plex Sans SC"', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
              mono: ['"JetBrains Mono"', '"Cascadia Code"', '"SF Mono"', 'monospace'],
            },
            colors: {
              term: {
                bg: 'rgb(var(--term-bg) / <alpha-value>)',
                panel: 'rgb(var(--term-panel) / <alpha-value>)',
                sub: 'rgb(var(--term-sub) / <alpha-value>)',
                border: 'rgb(var(--term-border) / <alpha-value>)',
                text: 'rgb(var(--term-text) / <alpha-value>)',
                muted: 'rgb(var(--term-muted) / <alpha-value>)',
                hi: 'rgb(var(--term-hi) / <alpha-value>)',
                cyan: 'rgb(var(--term-cyan) / <alpha-value>)',
                green: 'rgb(var(--term-green) / <alpha-value>)',
                red: 'rgb(var(--term-red) / <alpha-value>)',
                yellow: 'rgb(var(--term-yellow) / <alpha-value>)',
              },
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --term-bg: 248 250 252;
        --term-panel: 255 255 255;
        --term-sub: 243 244 246;
        --term-border: 226 232 240;
        --term-text: 71 85 105;
        --term-muted: 148 163 184;
        --term-hi: 15 23 42;
        --term-cyan: 14 116 144;
        --term-green: 5 150 105;
        --term-red: 220 38 38;
        --term-yellow: 202 138 4;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --term-bg: 3 7 18;
          --term-panel: 10 15 30;
          --term-sub: 15 23 42;
          --term-border: 30 41 59;
          --term-text: 148 163 184;
          --term-muted: 100 116 139;
          --term-hi: 226 232 240;
          --term-cyan: 34 211 238;
          --term-green: 16 185 129;
          --term-red: 248 113 113;
          --term-yellow: 250 204 21;
        }
      }

      body {
        background:
          radial-gradient(circle at top right, rgba(var(--term-cyan) / 0.15), transparent 45%),
          radial-gradient(circle at bottom left, rgba(var(--term-green) / 0.12), transparent 40%),
          rgb(var(--term-bg));
        color: rgb(var(--term-text));
        -webkit-font-smoothing: antialiased;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgb(var(--term-border));
      }

      ::-webkit-scrollbar-track {
        background: rgb(var(--term-bg));
      }

      input,
      select,
      textarea {
        font-size: 16px !important;
      }

      @media (min-width: 768px) {
        input,
        select,
        textarea {
          font-size: 13px !important;
        }
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid rgb(var(--term-border));
      }

      .gallery-backdrop {
        background: rgba(2, 6, 23, 0.8);
        backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body class="font-sans min-h-screen">
    <header class="sticky top-0 z-40 border-b border-term-border bg-term-bg/90 backdrop-blur">
      <div class="max-w-[1600px] mx-auto h-14 px-4 flex items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <span class="w-2 h-2 rounded-full bg-term-green animate-pulse"></span>
          <h1 class="text-sm md:text-base font-mono font-bold tracking-widest text-term-hi">HUAS_MONITOR/OPS</h1>
        </div>
        <div class="flex items-center gap-2">
          <button id="refreshBtn" class="h-8 px-3 border border-term-border bg-term-panel text-term-hi text-xs font-mono hover:text-term-cyan hover:border-term-cyan transition-colors">统一刷新</button>
        </div>
      </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 flex flex-col gap-4">
      <section class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3" id="summaryGrid"></section>

      <section class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div class="lg:col-span-2 border border-term-border bg-term-panel rounded-sm flex flex-col">
          <div class="p-3 border-b border-term-border bg-term-sub">
            <h2 class="text-xs font-mono text-term-hi"><span class="text-term-cyan">#</span> 统计分布</h2>
            <p class="text-[11px] font-mono text-term-muted mt-1">年级由学号中首个四位年份解析，支持 2024... / S2023... / Z2025...</p>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-3">
            <div class="table-wrap">
              <table class="w-full text-left whitespace-nowrap" id="majorStatsTable"></table>
            </div>
            <div class="table-wrap">
              <table class="w-full text-left whitespace-nowrap" id="gradeStatsTable"></table>
            </div>
          </div>
        </div>

        <div class="border border-term-border bg-term-panel rounded-sm p-3">
          <h2 class="text-xs font-mono text-term-hi mb-3"><span class="text-term-cyan">#</span> 系统状态</h2>
          <div id="systemPanel" class="grid grid-cols-1 gap-2 text-xs font-mono"></div>
          <div id="statusBadge" class="mt-3 inline-flex items-center gap-2 px-2 py-1 border border-term-border text-xs font-mono">加载中</div>
          <div id="lastRefresh" class="mt-2 text-[11px] font-mono text-term-muted"></div>
          <div id="errorMsg" class="mt-2 text-[11px] font-mono text-term-red hidden"></div>
        </div>
      </section>

      <section class="border border-term-border bg-term-panel rounded-sm flex flex-col">
        <div class="p-3 border-b border-term-border bg-term-sub flex flex-col gap-3">
          <h2 class="text-xs font-mono text-term-hi"><span class="text-term-cyan">#</span> 用户数据库</h2>
          <div class="grid grid-cols-1 md:grid-cols-12 gap-2">
            <input id="searchInput" placeholder="查询: 学号 / 姓名" class="md:col-span-4 h-10 md:h-9 px-3 border border-term-border bg-term-panel text-term-hi font-mono placeholder-term-muted focus:border-term-cyan outline-none" />
            <select id="majorSelect" class="md:col-span-3 h-10 md:h-9 px-2 border border-term-border bg-term-panel text-term-hi font-mono focus:border-term-cyan outline-none">
              <option value="">全部专业</option>
            </select>
            <select id="gradeSelect" class="md:col-span-3 h-10 md:h-9 px-2 border border-term-border bg-term-panel text-term-hi font-mono focus:border-term-cyan outline-none">
              <option value="">全部年级</option>
            </select>
            <div class="md:col-span-2 grid grid-cols-2 gap-2">
              <button id="applyFilterBtn" class="h-10 md:h-9 border border-term-border text-term-hi font-mono text-xs hover:text-term-cyan hover:border-term-cyan transition-colors">筛选</button>
              <button id="resetFilterBtn" class="h-10 md:h-9 border border-term-border text-term-muted font-mono text-xs hover:text-term-hi transition-colors">重置</button>
            </div>
          </div>
        </div>

        <div class="p-3">
          <div class="table-wrap">
            <table class="w-full text-left whitespace-nowrap" id="usersTable"></table>
          </div>
          <div class="mt-3 flex flex-col md:flex-row items-center justify-between gap-3 text-xs font-mono">
            <div id="pageInfo" class="text-term-muted">-</div>
            <div class="flex gap-2">
              <button id="prevPageBtn" class="h-8 px-3 border border-term-border disabled:opacity-30 hover:text-term-hi transition-colors">&lt;</button>
              <button id="nextPageBtn" class="h-8 px-3 border border-term-border disabled:opacity-30 hover:text-term-hi transition-colors">&gt;</button>
            </div>
          </div>
        </div>
      </section>

      <section class="grid grid-cols-1 xl:grid-cols-2 gap-4">
        <div class="border border-term-border bg-term-panel rounded-sm flex flex-col">
          <div class="p-3 border-b border-term-border bg-term-sub">
            <h2 class="text-xs font-mono text-term-hi"><span class="text-term-cyan">#</span> 公告管理</h2>
          </div>
          <form id="annForm" class="p-3 flex flex-col gap-2">
            <input id="annTitle" required placeholder="公告标题" class="h-10 md:h-9 px-3 border border-term-border bg-term-panel text-term-hi font-mono placeholder-term-muted focus:border-term-cyan outline-none" />
            <textarea id="annContent" required rows="4" placeholder="公告内容" class="w-full px-3 py-2 border border-term-border bg-term-panel text-term-hi font-mono placeholder-term-muted focus:border-term-cyan outline-none resize-y"></textarea>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
              <input id="annDate" type="date" required class="h-10 md:h-9 px-3 border border-term-border bg-term-panel text-term-hi font-mono focus:border-term-cyan outline-none" />
              <select id="annType" required class="h-10 md:h-9 px-2 border border-term-border bg-term-panel text-term-hi font-mono focus:border-term-cyan outline-none">
                <option value="info">info</option>
                <option value="warning">warning</option>
                <option value="error">error</option>
              </select>
            </div>
            <div class="flex gap-2">
              <button id="annSubmitBtn" class="h-9 px-4 bg-term-green text-white font-mono text-xs font-bold hover:opacity-90 transition-opacity" type="submit">新增公告</button>
              <button id="annCancelEditBtn" class="h-9 px-4 border border-term-border text-term-muted font-mono text-xs hover:text-term-hi hidden" type="button">取消编辑</button>
            </div>
          </form>
        </div>

        <div class="border border-term-border bg-term-panel rounded-sm flex flex-col">
          <div class="p-3 border-b border-term-border bg-term-sub">
            <h2 class="text-xs font-mono text-term-hi"><span class="text-term-cyan">#</span> 公告列表</h2>
          </div>
          <div class="p-3">
            <div class="table-wrap">
              <table class="w-full text-left whitespace-nowrap" id="announcementTable"></table>
            </div>
          </div>
        </div>
      </section>

      <section class="border border-term-border bg-term-panel rounded-sm flex flex-col">
        <div class="p-3 border-b border-term-border bg-term-sub flex flex-col gap-1">
          <h2 class="text-xs font-mono text-term-hi"><span class="text-term-cyan">#</span> 发现美食管理</h2>
          <p id="discoverMeta" class="text-[11px] font-mono text-term-muted">加载中</p>
        </div>
        <div class="p-3">
          <div class="table-wrap">
            <table class="w-full text-left whitespace-nowrap" id="discoverTable"></table>
          </div>
        </div>
      </section>

      <section class="border border-term-border bg-term-panel rounded-sm flex flex-col">
        <div class="p-3 border-b border-term-border bg-term-sub flex flex-col gap-2">
          <h2 class="text-xs font-mono text-term-hi"><span class="text-term-cyan">#</span> 树洞管理</h2>
          <p id="treeholeMeta" class="text-[11px] font-mono text-term-muted">加载中</p>
          <div class="grid grid-cols-1 md:grid-cols-12 gap-2">
            <input id="treeholeKeywordInput" placeholder="搜索内容 / 学号 / 姓名 / 班级" class="md:col-span-8 h-10 md:h-9 px-3 border border-term-border bg-term-panel text-term-hi font-mono placeholder-term-muted focus:border-term-cyan outline-none" />
            <button id="treeholeApplyBtn" class="md:col-span-2 h-10 md:h-9 border border-term-border text-term-hi font-mono text-xs hover:text-term-cyan hover:border-term-cyan transition-colors">搜索</button>
            <button id="treeholeResetBtn" class="md:col-span-2 h-10 md:h-9 border border-term-border text-term-muted font-mono text-xs hover:text-term-hi transition-colors">重置</button>
          </div>
        </div>
        <div class="p-3 grid grid-cols-1 xl:grid-cols-2 gap-4">
          <div class="border border-term-border rounded-sm">
            <div class="p-3 border-b border-term-border bg-term-sub text-[11px] font-mono text-term-muted">树洞列表</div>
            <div class="table-wrap">
              <table class="w-full text-left whitespace-nowrap" id="treeholePostsTable"></table>
            </div>
            <div class="p-3 flex flex-col md:flex-row items-center justify-between gap-2 text-xs font-mono">
              <div id="treeholePageInfo" class="text-term-muted">-</div>
              <div class="flex gap-2">
                <button id="treeholePrevPageBtn" class="h-8 px-3 border border-term-border disabled:opacity-30 hover:text-term-hi transition-colors">&lt;</button>
                <button id="treeholeNextPageBtn" class="h-8 px-3 border border-term-border disabled:opacity-30 hover:text-term-hi transition-colors">&gt;</button>
              </div>
            </div>
          </div>

          <div class="border border-term-border rounded-sm">
            <div id="treeholeCommentsMeta" class="p-3 border-b border-term-border bg-term-sub text-[11px] font-mono text-term-muted">请选择一条树洞查看评论</div>
            <div class="table-wrap">
              <table class="w-full text-left whitespace-nowrap" id="treeholeCommentsTable"></table>
            </div>
            <div class="p-3 flex flex-col md:flex-row items-center justify-between gap-2 text-xs font-mono">
              <div id="treeholeCommentsPageInfo" class="text-term-muted">-</div>
              <div class="flex gap-2">
                <button id="treeholeCommentsPrevPageBtn" class="h-8 px-3 border border-term-border disabled:opacity-30 hover:text-term-hi transition-colors">&lt;</button>
                <button id="treeholeCommentsNextPageBtn" class="h-8 px-3 border border-term-border disabled:opacity-30 hover:text-term-hi transition-colors">&gt;</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="border border-term-border bg-term-panel rounded-sm flex flex-col">
        <div class="p-3 border-b border-term-border bg-term-sub">
          <h2 class="text-xs font-mono text-term-hi"><span class="text-term-cyan">#</span> 终端日志</h2>
        </div>
        <div class="p-3">
          <div class="table-wrap max-h-[380px]">
            <table class="w-full text-left whitespace-nowrap" id="logsTable"></table>
          </div>
        </div>
      </section>
    </main>

    <div id="discoverPreviewModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 gallery-backdrop">
      <div class="w-full max-w-6xl max-h-[90vh] overflow-hidden border border-term-border bg-term-panel rounded-sm shadow-2xl flex flex-col">
        <div class="px-4 py-3 border-b border-term-border bg-term-sub flex items-center justify-between gap-3">
          <div>
            <div id="discoverPreviewTitle" class="text-sm font-mono text-term-hi">帖子图片</div>
            <div id="discoverPreviewMeta" class="text-[11px] font-mono text-term-muted mt-1">-</div>
          </div>
          <button id="discoverPreviewClose" class="h-8 px-3 border border-term-border text-term-muted font-mono text-xs hover:text-term-hi">关闭</button>
        </div>
        <div class="p-4 overflow-auto grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" id="discoverPreviewGrid"></div>
      </div>
    </div>

    <script>
      const BEIJING_TZ = 'Asia/Shanghai';

      const state = {
        page: 1,
        totalPages: 1,
        announcements: [],
        discoverPosts: [],
        editingId: null,
        treehole: {
          page: 1,
          totalPages: 1,
          pageSize: 10,
          keyword: '',
          selectedPostId: null,
          commentsPage: 1,
          commentsTotalPages: 1,
          posts: [],
        },
      };

      const el = {
        refreshBtn: document.getElementById('refreshBtn'),
        summaryGrid: document.getElementById('summaryGrid'),

        majorStatsTable: document.getElementById('majorStatsTable'),
        gradeStatsTable: document.getElementById('gradeStatsTable'),

        systemPanel: document.getElementById('systemPanel'),
        statusBadge: document.getElementById('statusBadge'),
        lastRefresh: document.getElementById('lastRefresh'),
        errorMsg: document.getElementById('errorMsg'),

        searchInput: document.getElementById('searchInput'),
        majorSelect: document.getElementById('majorSelect'),
        gradeSelect: document.getElementById('gradeSelect'),
        applyFilterBtn: document.getElementById('applyFilterBtn'),
        resetFilterBtn: document.getElementById('resetFilterBtn'),

        usersTable: document.getElementById('usersTable'),
        pageInfo: document.getElementById('pageInfo'),
        prevPageBtn: document.getElementById('prevPageBtn'),
        nextPageBtn: document.getElementById('nextPageBtn'),

        annForm: document.getElementById('annForm'),
        annTitle: document.getElementById('annTitle'),
        annContent: document.getElementById('annContent'),
        annDate: document.getElementById('annDate'),
        annType: document.getElementById('annType'),
        annSubmitBtn: document.getElementById('annSubmitBtn'),
        annCancelEditBtn: document.getElementById('annCancelEditBtn'),
        announcementTable: document.getElementById('announcementTable'),

        discoverMeta: document.getElementById('discoverMeta'),
        discoverTable: document.getElementById('discoverTable'),
        discoverPreviewModal: document.getElementById('discoverPreviewModal'),
        discoverPreviewTitle: document.getElementById('discoverPreviewTitle'),
        discoverPreviewMeta: document.getElementById('discoverPreviewMeta'),
        discoverPreviewGrid: document.getElementById('discoverPreviewGrid'),
        discoverPreviewClose: document.getElementById('discoverPreviewClose'),

        treeholeMeta: document.getElementById('treeholeMeta'),
        treeholeKeywordInput: document.getElementById('treeholeKeywordInput'),
        treeholeApplyBtn: document.getElementById('treeholeApplyBtn'),
        treeholeResetBtn: document.getElementById('treeholeResetBtn'),
        treeholePostsTable: document.getElementById('treeholePostsTable'),
        treeholePageInfo: document.getElementById('treeholePageInfo'),
        treeholePrevPageBtn: document.getElementById('treeholePrevPageBtn'),
        treeholeNextPageBtn: document.getElementById('treeholeNextPageBtn'),
        treeholeCommentsMeta: document.getElementById('treeholeCommentsMeta'),
        treeholeCommentsTable: document.getElementById('treeholeCommentsTable'),
        treeholeCommentsPageInfo: document.getElementById('treeholeCommentsPageInfo'),
        treeholeCommentsPrevPageBtn: document.getElementById('treeholeCommentsPrevPageBtn'),
        treeholeCommentsNextPageBtn: document.getElementById('treeholeCommentsNextPageBtn'),

        logsTable: document.getElementById('logsTable'),
      };

      function beijingDateTime(date = new Date()) {
        const parts = new Intl.DateTimeFormat('en-CA', {
          timeZone: BEIJING_TZ,
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
          hourCycle: 'h23',
        }).formatToParts(date);
        const map = Object.fromEntries(parts.map((part) => [part.type, part.value]));
        return `${map.year}-${map.month}-${map.day} ${map.hour}:${map.minute}:${map.second}`;
      }

      function beijingDate(date = new Date()) {
        return beijingDateTime(date).slice(0, 10);
      }

      function requestJson(url, options = {}) {
        return fetch(url, {
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {}),
          },
          ...options,
        })
          .then(async (res) => {
            let payload = null;
            try {
              payload = await res.json();
            } catch {
              payload = null;
            }
            if (!res.ok || !payload?.success) {
              throw new Error(payload?.error_message || `请求失败 (${res.status})`);
            }
            return payload.data;
          });
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function tableHead(columns) {
        return `<thead class="bg-term-sub text-term-text text-[11px] uppercase tracking-wider font-mono border-b border-term-border"><tr>${columns
          .map((c) => `<th class="px-3 py-2 font-normal">${c}</th>`)
          .join('')}</tr></thead>`;
      }

      function formatDate(value) {
        if (!value) return '-';
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        const pad = (n) => String(n).padStart(2, '0');
        return `${String(d.getFullYear()).slice(2)}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }

      function formatNumber(value) {
        return Number(value || 0).toLocaleString('en-US');
      }

      function formatUptime(seconds) {
        const s = Math.max(0, Number(seconds || 0));
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        if (d > 0) return `${d}天 ${h}小时 ${m}分`;
        if (h > 0) return `${h}小时 ${m}分 ${sec}秒`;
        return `${m}分 ${sec}秒`;
      }

      function setError(message) {
        if (!message) {
          el.errorMsg.classList.add('hidden');
          el.errorMsg.textContent = '';
          return;
        }
        el.errorMsg.classList.remove('hidden');
        el.errorMsg.textContent = `错误: ${message}`;
      }

      function renderSummary(metrics) {
        const items = [
          ['总用户数', formatNumber(metrics.totalUsers)],
          ['今日活跃', formatNumber(metrics.todayActiveUsers)],
          ['近7天活跃', formatNumber(metrics.activeUsers7d)],
          ['近7天新增', formatNumber(metrics.newUsers7d)],
          ['缓存条数', formatNumber(metrics.cacheEntries)],
          ['凭证条数', formatNumber(metrics.credentialEntries)],
          ['美食帖子', formatNumber(metrics.totalDiscoverPosts)],
          ['美食评分', formatNumber(metrics.totalDiscoverRatings)],
          ['RSS 内存', `${metrics.memory.rssMb} MB`],
          ['运行时长', formatUptime(metrics.uptimeSeconds)],
        ];

        el.summaryGrid.innerHTML = items
          .map(
            ([label, value]) => `
            <div class="border border-term-border bg-term-panel p-3 rounded-sm hover:border-term-cyan/50 transition-colors">
              <div class="text-[10px] font-mono text-term-muted mb-1">${label}</div>
              <div class="text-lg font-mono font-bold text-term-hi">${value}</div>
            </div>
          `
          )
          .join('');
      }

      function renderSystem(service, metrics) {
        const ok = service.status === 'ok';
        el.statusBadge.className = `mt-3 inline-flex items-center gap-2 px-2 py-1 border text-xs font-mono ${ok ? 'text-term-green border-term-green/40 bg-term-green/10' : 'text-term-red border-term-red/40 bg-term-red/10'}`;
        el.statusBadge.innerHTML = `${ok ? '●' : '■'} ${ok ? '服务正常' : '服务异常'}`;

        el.systemPanel.innerHTML = `
          <div><span class="text-term-muted">服务时间戳</span> <span class="text-term-hi">${escapeHtml(service.timestamp || '-')}</span></div>
          <div><span class="text-term-muted">RSS</span> <span class="text-term-cyan">${metrics.memory.rssMb} MB</span></div>
          <div><span class="text-term-muted">Heap Used</span> <span class="text-term-cyan">${metrics.memory.heapUsedMb} MB</span></div>
          <div><span class="text-term-muted">Heap Total</span> <span class="text-term-cyan">${metrics.memory.heapTotalMb} MB</span></div>
        `;
      }

      function renderDistTable(table, title, rows, key) {
        table.innerHTML = `${tableHead([title, '人数'])}<tbody class="text-[12px] font-mono divide-y divide-term-border/50">${
          rows.length > 0
            ? rows
                .map(
                  (row) =>
                    `<tr class="hover:bg-term-border/30"><td class="px-3 py-2 text-term-hi">${escapeHtml(row[key])}</td><td class="px-3 py-2 text-term-green">${formatNumber(row.count)}</td></tr>`
                )
                .join('')
            : `<tr><td colspan="2" class="px-3 py-6 text-center text-term-muted">暂无数据</td></tr>`
        }</tbody>`;
      }

      function renderSelectOptions(selectEl, values, placeholder) {
        const current = selectEl.value;
        const normalized = values
          .map((entry) => (typeof entry === 'string' ? { value: entry, label: entry } : entry))
          .filter((entry) => entry?.value);

        const seen = new Set();
        const deduped = normalized.filter((entry) => {
          if (seen.has(entry.value)) return false;
          seen.add(entry.value);
          return true;
        });

        selectEl.innerHTML = [`<option value="">${escapeHtml(placeholder)}</option>`, ...deduped.map((entry) => `<option value="${escapeHtml(entry.value)}">${escapeHtml(entry.label)}</option>`)].join('');

        if (current && deduped.some((entry) => entry.value === current)) {
          selectEl.value = current;
        }
      }

      function formatTreeholeAuthor(author) {
        if (!author || typeof author !== 'object') return '-';
        const parts = [author.studentId, author.name, author.className]
          .map((item) => String(item || '').trim())
          .filter(Boolean);
        return parts.length > 0 ? parts.join(' · ') : '-';
      }

      function buildTreeholePostsUrl() {
        const params = new URLSearchParams();
        params.set('page', String(state.treehole.page));
        params.set('pageSize', String(state.treehole.pageSize));
        if (state.treehole.keyword) {
          params.set('keyword', state.treehole.keyword);
        }
        return `/api/admin/treehole/posts?${params.toString()}`;
      }

      function buildTreeholeCommentsUrl(postId) {
        const params = new URLSearchParams();
        params.set('page', String(state.treehole.commentsPage));
        params.set('pageSize', '20');
        return `/api/admin/treehole/posts/${encodeURIComponent(postId)}/comments?${params.toString()}`;

      function renderTreeholePosts(data) {
        state.treehole.posts = data.items || [];
        state.treehole.page = data.page || 1;

        el.treeholeMeta.textContent = `树洞 ${formatNumber(summary.totalPosts || 0)} 条，评论 ${formatNumber(summary.totalComments || 0)} 条，点赞 ${formatNumber(summary.totalLikes || 0)} 次；当前命中 ${formatNumber(data.total || 0)} 条`;

          state.treehole.posts.length > 0

                      <td class="px-3 py-2.5 text-term-cyan">#${escapeHtml(item.id)}</td>
                      <td class="px-3 py-2.5 text-term-muted max-w-[220px] truncate" title="${escapeHtml(formatTreeholeAuthor(item.author))}">${escapeHtml(formatTreeholeAuthor(item.author))}</td>
                      <td class="px-3 py-2.5 text-term-hi max-w-[320px] truncate" title="${escapeHtml(item.content || '')}">${escapeHtml(item.content || '-')}</td>
                      <td class="px-3 py-2.5 text-term-muted">${escapeHtml(item.stats?.likeCount || 0)} / ${escapeHtml(item.stats?.commentCount || 0)}</td>
                      <td class="px-3 py-2.5 text-term-muted">${formatDate(item.publishedAt)}</td>
                      <td class="px-3 py-2.5">

                .join('')
            : `<tr><td colspan="6" class="px-3 py-6 text-center text-term-muted">暂无树洞</td></tr>`
        }</tbody>`;

        el.treeholePageInfo.textContent = `第 ${state.treehole.page} / ${state.treehole.totalPages} 页`;
        el.treeholePrevPageBtn.disabled = state.treehole.page <= 1;
        el.treeholeNextPageBtn.disabled = state.treehole.page >= state.treehole.totalPages;
      }

      function renderTreeholeComments(data) {
        if (!state.treehole.selectedPostId) {
          el.treeholeCommentsMeta.textContent = '请选择一条树洞查看评论';
          el.treeholeCommentsTable.innerHTML = `${tableHead(['ID', '作者', '内容', '时间', '操作'])}<tbody class="text-[12px] font-mono divide-y divide-term-border/50"><tr><td colspan="5" class="px-3 py-6 text-center text-term-muted">未选中树洞</td></tr></tbody>`;
          el.treeholeCommentsPageInfo.textContent = '-';
          el.treeholeCommentsPrevPageBtn.disabled = true;
          el.treeholeCommentsNextPageBtn.disabled = true;
          return;
        }

        const selectedPost = state.treehole.posts.find((item) => Number(item.id) === Number(state.treehole.selectedPostId));
        const selectedMeta = selectedPost
          ? `树洞 #${selectedPost.id} / ${formatTreeholeAuthor(selectedPost.author)}`
          : `树洞 #${state.treehole.selectedPostId}`;
        el.treeholeCommentsMeta.textContent = selectedMeta;

        const rows = data?.items || [];
        el.treeholeCommentsTable.innerHTML = `${tableHead(['ID', '作者', '内容', '时间', '操作'])}<tbody class="text-[12px] font-mono divide-y divide-term-border/50">${
          rows.length > 0
            ? rows
                .map((item) => `
                  <tr class="hover:bg-term-border/30">
                    <td class="px-3 py-2.5 text-term-cyan">#${escapeHtml(item.id)}</td>
                    <td class="px-3 py-2.5 text-term-muted max-w-[220px] truncate" title="${escapeHtml(formatTreeholeAuthor(item.author))}">${escapeHtml(formatTreeholeAuthor(item.author))}</td>
                    <td class="px-3 py-2.5 text-term-hi max-w-[300px] truncate" title="${escapeHtml(item.content || '')}">${escapeHtml(item.content || '-')}</td>
                    <td class="px-3 py-2.5 text-term-muted">${formatDate(item.createdAt)}</td>
                    <td class="px-3 py-2.5">
                      <button data-action="delete-treehole-comment" data-id="${escapeHtml(item.id)}" class="text-term-red hover:underline">删评</button>
                    </td>
                  </tr>
                `)
                .join('')
            : `<tr><td colspan="5" class="px-3 py-6 text-center text-term-muted">该树洞暂无评论</td></tr>`
        }</tbody>`;

        const page = Number(data?.page || 1);
        const pageSize = Number(data?.pageSize || 20);
        const total = Number(data?.total || 0);
        const totalPages = Math.max(1, Math.ceil(total / pageSize));
        state.treehole.commentsPage = page;
        state.treehole.commentsTotalPages = totalPages;

        el.treeholeCommentsPageInfo.textContent = `第 ${page} / ${totalPages} 页`;
        el.treeholeCommentsPrevPageBtn.disabled = page <= 1;
        el.treeholeCommentsNextPageBtn.disabled = page >= totalPages;

      async function refreshTreeholeCommentsPanel() {
        if (!state.treehole.selectedPostId) {
          renderTreeholeComments(null);
          return;
        }

        try {
          const data = await requestJson(buildTreeholeCommentsUrl(state.treehole.selectedPostId));
          renderTreeholeComments(data);
        } catch (err) {
          const message = err?.message || '';
          if (String(message).includes('帖子不存在')) {
            state.treehole.selectedPostId = null;
            state.treehole.commentsPage = 1;
            renderTreeholeComments(null);
            return;
          }
          throw err;
        }
      }

      async function refreshTreeholePanel() {
        const posts = await requestJson(buildTreeholePostsUrl());
        renderTreeholePosts(posts);
        await refreshTreeholeCommentsPanel();
      }

      function closeDiscoverPreview() {
        el.discoverPreviewModal.classList.add('hidden');
        el.discoverPreviewModal.classList.remove('flex');
        el.discoverPreviewGrid.innerHTML = '';

      function parseLogLine(line) {
        const tsMatch = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})/);
        const level = /\bERROR\b|\bERR\b/i.test(line)
          ? 'ERROR'
          : /\bWARN\b/i.test(line)
            ? 'WARN'
            : /\bINFO\b/i.test(line)
              ? 'INFO'
              : 'LOG';
        return {
          time: tsMatch?.[1] || '-',
          level,
          line,
        };
      }

      function renderLogs(logs) {
        const rows = (logs.items || []).map((item) => ({ ...parseLogLine(item.line), source: item.source }));
        el.logsTable.innerHTML = `${tableHead(['时间', '源', '级别', '内容'])}<tbody class="text-[12px] font-mono divide-y divide-term-border/50">${
          rows.length > 0
            ? rows
                .map((row) => {
                  const levelClass = row.level === 'ERROR' ? 'text-term-red' : row.level === 'WARN' ? 'text-term-yellow' : row.level === 'INFO' ? 'text-term-green' : 'text-term-muted';
                  return `<tr class="hover:bg-term-border/30"><td class="px-3 py-1.5 text-term-muted">${escapeHtml(row.time)}</td><td class="px-3 py-1.5 text-term-cyan">${escapeHtml(row.source)}</td><td class="px-3 py-1.5 ${levelClass}">${escapeHtml(row.level)}</td><td class="px-3 py-1.5 text-term-hi max-w-[900px] truncate" title="${escapeHtml(row.line)}">${escapeHtml(row.line)}</td></tr>`;
                })
                .join('')
            : `<tr><td colspan="4" class="px-3 py-6 text-center text-term-muted">暂无日志</td></tr>`
        }</tbody>`;
      }

      function resetAnnForm() {
        state.editingId = null;
        el.annTitle.value = '';
        el.annContent.value = '';
        el.annDate.value = beijingDate();
        el.annType.value = 'info';
        el.annSubmitBtn.textContent = '新增公告';
        el.annCancelEditBtn.classList.add('hidden');
      }

      function buildDashboardUrl() {
        const params = new URLSearchParams();
        params.set('page', String(state.page));
        const search = el.searchInput.value.trim();
        const major = el.majorSelect.value;
        const grade = el.gradeSelect.value;
        if (search) params.set('search', search);
        if (major) params.set('major', major);
        if (grade) params.set('grade', grade);
        return `/api/admin/dashboard?${params.toString()}`;
      }

      async function refreshDashboard() {
        setError('');
        el.refreshBtn.disabled = true;
        el.refreshBtn.textContent = '刷新中...';

        try {
          const data = await requestJson(buildDashboardUrl());
          renderSummary(data.metrics);
          renderSystem(data.service, data.metrics);
          renderDistTable(el.majorStatsTable, '专业', data.distributions.byMajor || [], 'className');
          renderDistTable(el.gradeStatsTable, '年级', data.distributions.byGrade || [], 'grade');
          renderUsers(data.users || {});
          renderAnnouncements(data.announcements || []);
          renderDiscoverPosts(data.discover || {});
          renderLogs(data.logs || {});
          await refreshTreeholePanel();
          el.lastRefresh.textContent = `最后刷新: ${beijingDateTime()} (北京时间)`;
        } catch (err) {
          setError(err.message || '刷新失败');
        } finally {
          el.refreshBtn.disabled = false;
          el.refreshBtn.textContent = '统一刷新';
        }
      }

      el.refreshBtn.addEventListener('click', async () => {
        await refreshDashboard();
      });

      el.applyFilterBtn.addEventListener('click', async () => {
        state.page = 1;
        await refreshDashboard();
      });

      el.searchInput.addEventListener('keypress', async (event) => {
        if (event.key !== 'Enter') return;
        state.page = 1;
        await refreshDashboard();
      });

      el.resetFilterBtn.addEventListener('click', async () => {
        el.searchInput.value = '';
        el.majorSelect.value = '';
        el.gradeSelect.value = '';
        state.page = 1;
        await refreshDashboard();
      });

      el.prevPageBtn.addEventListener('click', async () => {
        if (state.page <= 1) return;
        state.page -= 1;
        await refreshDashboard();
      });

      el.nextPageBtn.addEventListener('click', async () => {
        if (state.page >= state.totalPages) return;
        state.page += 1;
        await refreshDashboard();
      });

      el.treeholeApplyBtn.addEventListener('click', async () => {
        state.treehole.keyword = el.treeholeKeywordInput.value.trim();
        state.treehole.page = 1;
        state.treehole.selectedPostId = null;
        state.treehole.commentsPage = 1;
        try {
          await refreshTreeholePanel();
        } catch (err) {
          setError(err.message || '树洞列表刷新失败');
        }
      });

      el.treeholeKeywordInput.addEventListener('keypress', async (event) => {
        if (event.key !== 'Enter') return;
        state.treehole.keyword = el.treeholeKeywordInput.value.trim();
        state.treehole.page = 1;
        state.treehole.selectedPostId = null;
        state.treehole.commentsPage = 1;
        try {
          await refreshTreeholePanel();
        } catch (err) {
          setError(err.message || '树洞列表刷新失败');
        }
      });

      el.treeholeResetBtn.addEventListener('click', async () => {
        state.treehole.keyword = '';
        state.treehole.page = 1;
        state.treehole.selectedPostId = null;
        state.treehole.commentsPage = 1;
        el.treeholeKeywordInput.value = '';
        try {
          await refreshTreeholePanel();
        } catch (err) {
          setError(err.message || '树洞列表刷新失败');

      });

      el.treeholePrevPageBtn.addEventListener('click', async () => {
        if (state.treehole.page <= 1) return;
        state.treehole.page -= 1;
        state.treehole.selectedPostId = null;
        state.treehole.commentsPage = 1;
        try {
          await refreshTreeholePanel();
        } catch (err) {
          setError(err.message || '树洞列表刷新失败');

      });

      el.treeholeNextPageBtn.addEventListener('click', async () => {
        if (state.treehole.page >= state.treehole.totalPages) return;
        state.treehole.page += 1;
        state.treehole.selectedPostId = null;
        state.treehole.commentsPage = 1;
        try {
          await refreshTreeholePanel();
        } catch (err) {
          setError(err.message || '树洞列表刷新失败');
        }
      });

      el.treeholePostsTable.addEventListener('click', async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const btn = target.closest('button[data-action]');
        if (!btn) return;

        const action = btn.getAttribute('data-action');
        const id = Number(btn.getAttribute('data-id'));
        if (!Number.isInteger(id) || id <= 0) return;

        if (action === 'select-treehole-post') {
          state.treehole.selectedPostId = id;
          state.treehole.commentsPage = 1;
          try {
            await refreshTreeholeCommentsPanel();
          } catch (err) {
            setError(err.message || '评论刷新失败');
          }
          return;
        }

        if (action === 'delete-treehole-post') {
          if (!window.confirm(`确认删除树洞 #${id} ?`)) return;
          try {
            await requestJson(`/api/admin/treehole/posts/${encodeURIComponent(id)}`, { method: 'DELETE' });
            if (Number(state.treehole.selectedPostId) === id) {
              state.treehole.selectedPostId = null;
              state.treehole.commentsPage = 1;
            }
            await refreshDashboard();
          } catch (err) {
            setError(err.message || '删除树洞失败');
          }
        }
      });

      el.treeholeCommentsTable.addEventListener('click', async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const btn = target.closest('button[data-action]');
        if (!btn) return;

        const action = btn.getAttribute('data-action');
        const id = Number(btn.getAttribute('data-id'));
        if (action !== 'delete-treehole-comment' || !Number.isInteger(id) || id <= 0) return;

        if (!window.confirm(`确认删除评论 #${id} ?`)) return;

        try {
          await requestJson(`/api/admin/treehole/comments/${encodeURIComponent(id)}`, { method: 'DELETE' });
          await refreshDashboard();
        } catch (err) {
          setError(err.message || '删除评论失败');
        }
      });

      el.treeholeCommentsPrevPageBtn.addEventListener('click', async () => {
        if (state.treehole.commentsPage <= 1 || !state.treehole.selectedPostId) return;
        state.treehole.commentsPage -= 1;
        try {
          await refreshTreeholeCommentsPanel();
        } catch (err) {
          setError(err.message || '评论刷新失败');
        }
      });

      el.treeholeCommentsNextPageBtn.addEventListener('click', async () => {
        if (state.treehole.commentsPage >= state.treehole.commentsTotalPages || !state.treehole.selectedPostId) return;
        state.treehole.commentsPage += 1;
        try {
          await refreshTreeholeCommentsPanel();
        } catch (err) {
          setError(err.message || '评论刷新失败');
        }
      });

      el.announcementTable.addEventListener('click', async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const btn = target.closest('button[data-action]');
        if (!btn) return;

        const action = btn.getAttribute('data-action');
        const id = btn.getAttribute('data-id');
        if (!id) return;

        if (action === 'edit') {
          const item = state.announcements.find((ann) => ann.id === id);
          if (!item) return;
          state.editingId = id;
          el.annTitle.value = item.title;
          el.annContent.value = item.content;
          el.annDate.value = item.date;
          el.annType.value = item.type;
          el.annSubmitBtn.textContent = '保存修改';
          el.annCancelEditBtn.classList.remove('hidden');
          return;
        }

        if (action === 'delete') {
          if (!window.confirm(`确认删除公告 ${id} ?`)) return;
          try {
            await requestJson(`/api/admin/announcements/${encodeURIComponent(id)}`, { method: 'DELETE' });
            await refreshDashboard();
            resetAnnForm();
          } catch (err) {
            setError(err.message || '删除失败');
          }
        }
      });

      el.discoverTable.addEventListener('click', async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const btn = target.closest('button[data-action]');
        if (!btn) return;

        const action = btn.getAttribute('data-action');
        const id = btn.getAttribute('data-id');
        if (!id) return;

        if (action === 'preview-discover') {
          const item = state.discoverPosts.find((post) => String(post.id) === String(id));
          if (!item) return;
          openDiscoverPreview(item);
          return;
        }

        if (!window.confirm(`确认删除帖子 #${id} ?`)) return;

        try {
          await requestJson(`/api/admin/discover/posts/${encodeURIComponent(id)}`, { method: 'DELETE' });
          await refreshDashboard();
        } catch (err) {
          setError(err.message || '删除帖子失败');
        }
      });

      el.discoverPreviewClose.addEventListener('click', () => {
        closeDiscoverPreview();
      });

      el.discoverPreviewModal.addEventListener('click', (event) => {
        if (event.target === el.discoverPreviewModal) {
          closeDiscoverPreview();
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !el.discoverPreviewModal.classList.contains('hidden')) {
          closeDiscoverPreview();
        }
      });

      el.annCancelEditBtn.addEventListener('click', () => {
        resetAnnForm();
      });

      el.annForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const payload = {
          title: el.annTitle.value.trim(),
          content: el.annContent.value.trim(),
          date: el.annDate.value,
          type: el.annType.value,
        };

        if (!payload.title || !payload.content) {
          setError('标题和内容不能为空');
          return;
        }

        try {
          if (state.editingId) {
            await requestJson(`/api/admin/announcements/${encodeURIComponent(state.editingId)}`, {
              method: 'PUT',
              body: JSON.stringify(payload),
            });
          } else {
            await requestJson('/api/admin/announcements', {
              method: 'POST',
              body: JSON.stringify(payload),
            });
          }

          resetAnnForm();
          await refreshDashboard();
        } catch (err) {
          setError(err.message || '保存公告失败');
        }
      });

      el.treeholeKeywordInput.value = state.treehole.keyword;
      resetAnnForm();
      refreshDashboard();
    </script>
  </body>
</html>
